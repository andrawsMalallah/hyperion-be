name: CI

# Runs the test suite + code-style check on every push to main and on PRs.
# The tests use an in-memory SQLite database (forced in phpunit.xml), so no
# database service is needed. Passport keys/clients are provisioned by the
# tests themselves (see tests/Feature/AuthTest.php + ProfileTest.php).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Pint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, xml, ctype, bcmath, sqlite3, pdo_sqlite, openssl, tokenizer, fileinfo
          coverage: none

      - name: Copy environment file
        run: cp .env.example .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test

      - name: Check code style (Pint)
        if: ${{ !cancelled() }}
        run: vendor/bin/pint --test
